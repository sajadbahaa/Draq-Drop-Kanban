<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Drop KnbaN</title>
    <!-- file css  -->
     <link rel="stylesheet" href="style.css">

     <!-- file js -->
      <script src="main.js" defer></script>
</head>
<body class="flex">
    <!-- header -->
     <header class="Kanban-header">
        <h1>Simple Kanban Board</h1>
     </header>
     <!-- end header -->

     <!-- cotainer cards -->
      <main class="Kanban flex">
      <!-- toDo -->
    <section id="" class="kanban-column">
<h2 class="kanban-column-title">To Do</h2>
<ul  class="kanban-list flex">
<li class="kanban-task" draggable="true">Task 1</li>
<li class="kanban-task" draggable="true">Task 2</li>
<li class="kanban-task" draggable="true">Task 3</li>
<li class="kanban-task" draggable="true">Task 4</li>
<li class="kanban-task" draggable="true">Task 5</li>
<li class="kanban-task" draggable="true">Task 6</li>
<li class="kanban-task" draggable="true">Task 7</li>
</ul>
        </section>

        <!-- end toDo -->
         <!-- In Progress -->
        <section id="" class="kanban-column">
<h2 class="kanban-column-title">In Progress</h2>
<ul  class="kanban-list flex">
</ul>
        </section>
        <!-- end In progress -->

        <!-- Done -->
        <section id="" class="kanban-column">
<h2 class="kanban-column-title">Done</h2>
<ul  class="kanban-list flex">
</ul>
        </section>
        <!-- end Done -->

      </main>
      <!-- end container cards -->
</body>
</html>
